services:
  backend:
    build: ./backend
    container_name: nba-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount source code so file changes hot-reload (dev only).
      - ./backend:/app
      # Anonymous volume that prevents the host's empty .venv from
      # clobbering the container's .venv. Critical on Windows.
      - /app/.venv
    environment:
      - ENVIRONMENT=development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: nba-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend